<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous" />
    <link rel="stylesheet" href="styles/style.css">
    <title>Login - Pasapalabra</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top bg-secondary">
        <div class="container-fluid d-flex flex-row align-items-center">
            <div class="flex-grow-1">
                <h4 class="text-black mb-1">Pasapalabra</h4>
                <h5 class="text-black mb-1">5to B Informatica 2026 - Colegio Pio IX</h5>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="shadow p-3 mb-4 bg-white rounded">
            <legend>Iniciar sesion</legend>

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="email" placeholder="email" />
                <label for="email">Email</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" placeholder="********" />
                <label for="password">Contrasena</label>
            </div>

            <div class="mb-3 d-flex justify-content-end">
                <button class="btn btn-success" onclick="handleLogin()">
                    Iniciar sesion
                </button>
            </div>

            <p id="mensajeLogin"></p>
        </div>

        <div class="shadow p-3 mb-4 bg-white rounded">
            <legend>¿No tenés cuenta? Registrate acá.</legend>
            <div class="mb-3 d-flex justify-content-end">
                <a href="registro.html" class="btn btn-danger">Ir al registro</a>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
    <script src="scripts/login.js"></script>

</body>
</html>
