<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous" />
<link rel="stylesheet" href="styles/style.css">
<title>Panel Administrador - Pasapalabra</title>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top bg-secondary">
    <div class="container-fluid d-flex flex-row align-items-center">
        <div class="flex-grow-1">
            <h4 class="text-black mb-1">Pasapalabra</h4>
            <h5 class="text-black mb-1">Panel de Administrador</h5>
        </div>
        <button class="btn btn-outline-dark" onclick="cerrarSesion()">Cerrar sesion</button>
    </div>
</nav>

<div class="container mt-4">

    <div class="shadow p-3 mb-4 bg-white rounded">
        <legend>Agregar pregunta</legend>
        <div class="row g-2">
            <div class="col-2"><input id="nuevaLetra" class="form-control" placeholder="Letra" maxlength="2"></div>
            <div class="col-3"><input id="nuevaPregunta" class="form-control" placeholder="Pregunta"></div>
            <div class="col-3"><input id="nuevaRespuesta" class="form-control" placeholder="Respuesta"></div>
            <div class="col-2">
                <select id="nuevaDificultad" class="form-select">
                    <option value="facil">Facil</option>
                    <option value="medio">Medio</option>
                    <option value="dificil">Dificil</option>
                </select>
            </div>
            <div class="col-2"><button class="btn btn-success w-100" onclick="agregarPregunta()">Agregar</button></div>
        </div>
    </div>

    <div class="shadow p-3 mb-4 bg-white rounded">
        <legend>Preguntas cargadas</legend>
        <table class="table">
            <thead><tr><th>Letra</th><th>Pregunta</th><th>Respuesta</th><th>Dificultad</th><th></th></tr></thead>
            <tbody id="tablaPreguntas"></tbody>
        </table>
    </div>

    <div class="shadow p-3 mb-4 bg-white rounded">
        <legend>Usuarios</legend>
        <table class="table">
            <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Admin</th><th></th></tr></thead>
            <tbody id="tablaUsuarios"></tbody>
        </table>
    </div>

    <div class="shadow p-3 mb-4 bg-white rounded">
        <legend>Puntajes</legend>
        <table class="table">
            <thead><tr><th>Usuario</th><th>Puntaje</th><th>Fecha</th><th></th></tr></thead>
            <tbody id="tablaPuntajes"></tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
<script src="scripts/inicio.js"></script>
<script src="scripts/admin.js"></script>
</body>
</html>
